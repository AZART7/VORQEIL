<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080c14" />
    <title>Admin Dashboard — VORQEIL</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" href="css/platform.css" />
</head>
<body>
    <div id="loadingScreen"><div class="loading-spinner"></div></div>
    <div id="notificationContainer"></div>

    <header class="platform-header">
        <div class="container-fluid px-4">
            <div class="d-flex align-items-center justify-content-between">
                <a href="index.html" class="brand text-decoration-none">
                    VORQ<span class="accent">EIL</span><span class="brand-dot"></span>
                    <span class="badge-status badge-ongoing ms-2" style="font-size:0.7rem;">ADMIN</span>
                </a>
                <div class="dropdown">
                    <button class="profile-dropdown-btn dropdown-toggle" data-bs-toggle="dropdown">
                        <img src="https://i.pravatar.cc/100?u=admin" alt="Admin" id="adminProfilePic" />
                        <span class="d-none d-md-inline" id="adminName">Admin</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end profile-dropdown-menu">
                        <li><a href="#" onclick="navigateTo('settings')"><i class="fas fa-cog"></i> Settings</a></li>
                        <li><hr style="border-color:var(--border-subtle);" /></li>
                        <li><button onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button></li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <aside class="platform-sidebar" id="platformSidebar">
        <div class="sidebar-section-title">Admin Panel</div>
        <button class="sidebar-nav-item active" data-section="overview" onclick="navigateTo('overview')">
            <i class="fas fa-tachometer-alt"></i> Dashboard Overview
        </button>
        <button class="sidebar-nav-item" data-section="users" onclick="navigateTo('users')">
            <i class="fas fa-users"></i> User Management
        </button>
        <button class="sidebar-nav-item" data-section="courses-mgmt" onclick="navigateTo('courses-mgmt')">
            <i class="fas fa-book"></i> Course Management
        </button>
        <button class="sidebar-nav-item" data-section="payments-mgmt" onclick="navigateTo('payments-mgmt')">
            <i class="fas fa-credit-card"></i> Payment History
        </button>
        <button class="sidebar-nav-item" data-section="certificates-mgmt" onclick="navigateTo('certificates-mgmt')">
            <i class="fas fa-certificate"></i> Certificates
        </button>
        <button class="sidebar-nav-item" data-section="announcements" onclick="navigateTo('announcements')">
            <i class="fas fa-bullhorn"></i> Announcements
        </button>
        <hr style="border-color:var(--border-subtle);margin:16px 0;" />
        <button class="sidebar-nav-item text-danger" onclick="handleLogout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </aside>

    <main class="platform-main" id="adminMain">
        <div id="adminContent"></div>
    </main>

    <button class="mobile-sidebar-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/admin-app.js"></script>
</body>
</html>
