<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080c14" />
    <meta name="description" content="VORQEIL Student Dashboard - Your learning hub for digital skills mastery." />
    <title>Student Dashboard — VORQEIL</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" href="css/platform.css" />

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="loading-spinner"></div>
    </div>

    <!-- Notification Container -->
    <div id="notificationContainer"></div>

    <!-- Header -->
    <header class="platform-header">
        <div class="container-fluid px-4">
            <div class="d-flex align-items-center justify-content-between">
                <a href="index.html" class="brand text-decoration-none">
                    VORQ<span class="accent">EIL</span><span class="brand-dot"></span>
                </a>
                <div class="d-flex align-items-center gap-3">
                    <span class="text-muted d-none d-md-inline" id="welcomeMessage"></span>
                    <div class="dropdown">
                        <button class="profile-dropdown-btn dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" id="profileDropdownBtn">
                            <img src="https://i.pravatar.cc/100?u=default" alt="Profile" id="headerProfilePic" />
                            <span id="headerProfileName" class="d-none d-md-inline">Student</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end profile-dropdown-menu">
                            <li><a href="#" onclick="navigateTo('profile')"><i class="fas fa-user"></i> My Profile</a></li>
                            <li><a href="#" onclick="navigateTo('courses')"><i class="fas fa-book-open"></i> My Courses</a></li>
                            <li><a href="#" onclick="navigateTo('certificates')"><i class="fas fa-certificate"></i> Certificates</a></li>
                            <li><a href="#" onclick="navigateTo('settings')"><i class="fas fa-cog"></i> Settings</a></li>
                            <li><hr class="dropdown-divider" style="border-color:var(--border-subtle);" /></li>
                            <li><button onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside class="platform-sidebar" id="platformSidebar">
        <div class="sidebar-section-title">Main Menu</div>
        <button class="sidebar-nav-item active" data-section="overview" onclick="navigateTo('overview')">
            <i class="fas fa-th-large"></i> Dashboard
        </button>
        <button class="sidebar-nav-item" data-section="courses" onclick="navigateTo('courses')">
            <i class="fas fa-book-open"></i> My Courses
        </button>
        <button class="sidebar-nav-item" data-section="progress" onclick="navigateTo('progress')">
            <i class="fas fa-chart-line"></i> Learning Progress
        </button>
        <button class="sidebar-nav-item" data-section="certificates" onclick="navigateTo('certificates')">
            <i class="fas fa-certificate"></i> Certificates
        </button>

        <div class="sidebar-section-title">Activities</div>
        <button class="sidebar-nav-item" data-section="assignments" onclick="navigateTo('assignments')">
            <i class="fas fa-tasks"></i> Assignments
        </button>
        <button class="sidebar-nav-item" data-section="classes" onclick="navigateTo('classes')">
            <i class="fas fa-calendar-alt"></i> Upcoming Classes
        </button>
        <button class="sidebar-nav-item" data-section="notifications" onclick="navigateTo('notifications')">
            <i class="fas fa-bell"></i> Notifications
        </button>

        <div class="sidebar-section-title">Account</div>
        <button class="sidebar-nav-item" data-section="payments" onclick="navigateTo('payments')">
            <i class="fas fa-credit-card"></i> Payment History
        </button>
        <button class="sidebar-nav-item" data-section="profile" onclick="navigateTo('profile')">
            <i class="fas fa-user-circle"></i> My Profile
        </button>
        <button class="sidebar-nav-item" data-section="settings" onclick="navigateTo('settings')">
            <i class="fas fa-cog"></i> Settings
        </button>

        <hr style="border-color:var(--border-subtle);margin:16px 0;" />
        <button class="sidebar-nav-item text-danger" onclick="handleLogout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </aside>

    <!-- Main Content -->
    <main class="platform-main" id="dashboardMain">
        <div id="dashboardContent">
            <!-- Content rendered dynamically -->
        </div>
    </main>

    <!-- Mobile Toggle -->
    <button class="mobile-sidebar-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Dashboard Application -->
    <script type="module" src="js/dashboard-app.js"></script>
</body>
</html>
